name: Create Empty Branch

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Name of the new branch'
        required: true

jobs:
  create-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4

      - name: Create empty orphan branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          NEW_BRANCH=${{ github.event.inputs.branch_name }}
          
          # Create an orphan branch
          git checkout --orphan "$NEW_BRANCH"
          git rm -rf . || true  # Remove all files if any
          echo "# Empty branch: $NEW_BRANCH" > README.md
          git add README.md
          git commit -m "Initial commit on empty branch: $NEW_BRANCH"
          git push origin "$NEW_BRANCH"
