name: Create Empty Branch

on:
  workflow_dispatch:

jobs:
  create-dist-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4

      - name: Create or reset orphan `dist` branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch all branches
          git fetch origin

          # Create orphan branch
          git checkout --orphan dist

          # Remove all tracked files from index and disk
          git rm -rf . || true

          # Add a placeholder file so the branch can be pushed
          echo "# Empty dist branch" > README.md
          git add README.md
          git commit -m "Initial commit on empty dist branch"

          # Force push to replace dist branch if it exists
          git push --force origin dist
