name: Create Dist Branch on Main Update

on:
  push:
    branches:
      - main

jobs:
  create-dist-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create and push dist branch
        run: |
          git checkout -b dist
          git push origin dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
